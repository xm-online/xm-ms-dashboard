version: '2'
services:
    dashboard-postgresql:
        image: postgres:18.4
        # volumes:
        #     - ~/volumes/jhipster/dashboard/postgresql/:/var/lib/postgresql/data/
        environment:
            - POSTGRES_USER=dashboard
            - POSTGRES_PASSWORD=
            - POSTGRES_DB=dashboard
            - POSTGRES_HOST_AUTH_METHOD=trust
        ports:
            - "127.0.0.1:${POSTGRES_PORT}:5432"
